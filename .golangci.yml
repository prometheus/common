version: "2"
linters:
  enable:
    - errorlint
    - misspell
    - perfsprint
    - revive
    - testifylint
  settings:
    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: false
    revive:
      rules:
        - name: unused-parameter
          severity: warning
          disabled: true
    testifylint:
      enable-all: true
      disable:
        - go-require
      formatter:
        require-f-funcs: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/prometheus/common
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
